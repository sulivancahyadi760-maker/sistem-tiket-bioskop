<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABSOLUTE CINEMA</title>
  <link rel="stylesheet" href="globals.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Specific Index Styles */
    .hero-section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 5vw;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
      z-index: -2;
      filter: grayscale(100%) contrast(120%);
      transform: scale(1.05);
      animation: panZoom 20s infinite alternate linear;
    }

    @keyframes panZoom {
      0% { transform: scale(1.05) translate(0, 0); }
      100% { transform: scale(1.15) translate(-2%, -2%); }
    }

    .hero-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to top, var(--bg-main) 0%, rgba(5,5,5,0.6) 50%, rgba(5,5,5,0.8) 100%);
      z-index: -1;
    }

    .hero-content {
      position: relative;
      z-index: 10;
      max-width: 1200px;
    }

    .brand-eyebrow {
      font-family: var(--font-body);
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--accent-neon);
      margin-bottom: 20px;
      font-weight: 500;
      display: block;
    }

    .hero-title {
      margin: 0;
      margin-bottom: 30px;
      line-height: 0.85;
      text-transform: uppercase;
    }
    
    .hero-title span {
      display: block;
    }

    .hero-desc {
      font-size: 1.25rem;
      max-width: 500px;
      color: var(--text-muted);
      margin-bottom: 50px;
      line-height: 1.6;
    }

    .hero-actions {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .vertical-scroll-indicator {
      position: absolute;
      right: 5vw;
      bottom: 5vw;
      display: flex;
      align-items: center;
      gap: 15px;
      transform: rotate(90deg);
      transform-origin: right bottom;
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .vertical-scroll-indicator::before {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: var(--text-muted);
    }

  </style>
</head>
<body>
  <div class="bg-noise"></div>

  <section class="hero-section">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    
    <div class="hero-content">
      <span class="brand-eyebrow reveal-1">Premium Ticketing</span>
      <h1 class="hero-title text-huge reveal-2">
        <span>Absolute</span>
        <span class="text-neon">Cinema.</span>
      </h1>
      <p class="hero-desc reveal-3">
        Enter the void. A brutally dark, radically luxurious platform designed entirely for those who treat film as a ritual. No distractions. Pure visual immersion.
      </p>
      
      <div class="hero-actions reveal-3" style="animation-delay: 0.6s;">
        <a href="login/login.html" class="btn">Enter The Void</a>
        <a href="customer/customer.html" class="btn btn-outline">Browse Catalog</a>
      </div>
    </div>

    <div class="vertical-scroll-indicator reveal-3" style="animation-delay: 1s;">
      Discover
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
