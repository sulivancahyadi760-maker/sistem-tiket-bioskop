<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineMagic - Experience Cinematic Excellence</title>
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
      .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        background: linear-gradient(rgba(8, 8, 8, 0.6), rgba(8, 8, 8, 0.9)),
          url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=2070&auto=format&fit=crop")
            center/cover;
        padding: 20px;
      }
      .hero h1 {
        font-size: 5rem;
        margin-bottom: 20px;
        color: var(--cinematic-yellow);
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        animation: fadeInDown 1s ease-out;
      }
      .hero p {
        font-size: 1.5rem;
        margin-bottom: 40px;
        max-width: 600px;
        color: var(--text-main);
        animation: fadeInUp 1s ease-out 0.5s both;
      }
      .hero-buttons {
        display: flex;
        gap: 20px;
        animation: fadeInUp 1s ease-out 1s both;
      }
      .btn-outline {
        background: transparent;
        border: 2px solid var(--cinematic-yellow);
        color: var(--cinematic-yellow);
      }
      .btn-outline:hover {
        background: var(--cinematic-yellow);
        color: #000;
        border-color: var(--cinematic-yellow);
      }
      .btn-hero {
        padding: 15px 30px;
        font-size: 1.1rem;
        border-radius: 8px;
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <h1>CINEMAGIC</h1>
      <p>Pengalaman menonton bioskop premium dengan nuansa gelap dan mewah.</p>
      <div class="hero-buttons">
        <button class="btn-hero" onclick="window.location.href='login/login.html'">LOGIN SEKARANG</button>
        <button class="btn-outline btn-hero" onclick="window.location.href='customer/customer.html'">
          JELAJAHI FILM
        </button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
