<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Customer - ABSOLUTE CINEMA</title>
  <link rel="stylesheet" href="../globals.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-noise"></div>

  <nav class="customer-nav reveal-1">
    <div class="nav-brand">ABSOLUTE<span class="text-neon">CINEMA.</span></div>
    <div class="user-info">
      <span class="greeting">PATRON: <strong id="usernameDisplay"></strong></span>
      <span class="saldo-badge" id="saldoDisplay">0</span>
      <button id="logoutBtn" class="btn btn-sm btn-outline" style="border-color: #ff3333; color: #ff3333;">LOGOUT</button>
    </div>
  </nav>

  <div class="container reveal-2">
    <div class="tabs">
      <button id="tabBrowse" class="tab-btn active" onclick="switchTab('browse')">NOW PLAYING</button>
      <button id="tabTickets" class="tab-btn" onclick="switchTab('tickets')">YOUR STUBS</button>
    </div>

    <div id="viewBrowse">
      <div id="scheduleGrid" class="editorial-grid"></div>
    </div>

    <div id="viewTickets" class="hidden">
      <div id="ticketGrid" class="editorial-grid"></div>
    </div>
  </div>

  <section id="bookingModal" class="modal-overlay hidden">
    <div class="modal-content ticket-booking-modal">
      <h3 class="text-huge" style="font-size: 3rem; margin-bottom: 20px;">ACQUIRE</h3>
      <div id="bookingInfo" class="booking-info-box"></div>
      
      <form id="bookingForm" style="margin-top: 30px;">
        <input type="hidden" id="bookMovie" />
        <input type="hidden" id="bookStudio" />
        <input type="hidden" id="bookTime" />
        <input type="hidden" id="bookPrice" />
        
        <div class="form-group">
          <label>Seat Designation</label>
          <input type="hidden" id="bookSeat" required />
          <div class="seat-map-container">
            <div class="screen-indicator">SCREEN</div>
            <div id="seatGrid" class="seat-grid">
              <!-- seats generated by js -->
            </div>
            <div class="seat-legend">
              <div class="legend-item"><div class="seat seat-available"></div><span>AVAILABLE</span></div>
              <div class="legend-item"><div class="seat seat-selected"></div><span>SELECTED</span></div>
              <div class="legend-item"><div class="seat seat-booked"></div><span>OCCUPIED</span></div>
            </div>
            <div class="selected-seat-display">Seat: <span id="selectedSeatLabel">NONE</span></div>
          </div>
        </div>
        
        <div style="display: flex; gap: 15px; margin-top: 25px;">
          <button type="submit" class="btn" style="flex: 2;">CONFIRM TRANSACTION</button>
          <button type="button" class="btn btn-outline" onclick="closeModal()" style="flex: 1; border-color: var(--text-muted); color: var(--text-muted);">ABORT</button>
        </div>
      </form>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
