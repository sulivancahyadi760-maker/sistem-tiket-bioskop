<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login Bioskop</title>
    <link rel="stylesheet" href="../globals.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <h1 id="authTitle">CINEMA LOGIN</h1>
        <form id="authForm">
          <input type="text" id="username" placeholder="Username" required />
          <input type="password" id="password" placeholder="Password" required />

          <div id="registerFields" class="hidden">
            <input type="number" id="saldo" placeholder="Saldo Awal (Rp)" value="100000" />
            <select id="role">
              <option value="customer">Customer</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <button type="submit" id="submitBtn">ENTER</button>
        </form>
        <p id="errorMsg" class="error"></p>
        <p class="toggle-link"><a href="#" id="toggleAuth">Belum punya akun? Daftar disini</a></p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
